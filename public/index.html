<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>📋 Task Manager</h1>
        <div class="stats-container" id="statsContainer">
            <div class="stat-card">
                <span class="stat-value" id="totalTasks">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="completedTasks">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="pendingTasks">0</span>
                <span class="stat-label">Pending</span>
            </div>
        </div>
    </header>

    <main>
        <!-- Add Task Form -->
        <section class="add-task-section">
            <h2>Create New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <input type="text" id="taskTitle" placeholder="Task title" required>
                </div>
                <div class="form-group">
                    <textarea id="taskDescription" placeholder="Task description" required></textarea>
                </div>
                <div class="form-group">
                    <select id="taskPriority" required>
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Add Task</button>
            </form>
        </section>

        <!-- Filters -->
        <section class="filters-section">
            <h2>Filter Tasks</h2>
            <div class="filters">
                <select id="filterPriority">
                    <option value="">All Priorities</option>
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <select id="filterCompleted">
                    <option value="">All Tasks</option>
                    <option value="false">Pending</option>
                    <option value="true">Completed</option>
                </select>
                <button class="btn btn-secondary" id="clearFilters">Clear Filters</button>
            </div>
        </section>

        <!-- Tasks List -->
        <section class="tasks-section">
            <h2>Tasks</h2>
            <div id="tasksContainer" class="tasks-container">
                <p class="empty-state">No tasks yet. Create one above!</p>
            </div>
        </section>
    </main>

    <!-- Modal for task details -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div id="toast" class="toast"></div>
</div>

<script src="app.js"></script>
</body>
</html>
